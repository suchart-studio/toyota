<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toyota Khon Kaen - Main</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Kanit', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex justify-center items-center min-h-screen">
    <div class="w-full max-w-md min-h-screen bg-white shadow-2xl flex flex-col justify-between p-6 border-t-8 border-red-600">
        
        <div class="flex flex-col items-center mt-12">
            <div class="w-48 h-48 flex items-center justify-center bg-gray-100 rounded-full shadow-inner p-4 overflow-hidden">
                <img src="logo.png" alt="Toyota Logo" class="object-contain w-full h-full fallback-logo" onerror="this.src='https://placehold.co/200x200/ef4444/ffffff?text=TOYOTA'">
            </div>
            <h1 class="text-2xl font-bold text-gray-800 mt-6 text-center tracking-wide">โตโยต้าขอนแก่น</h1>
            <p class="text-sm text-gray-500 mt-1">ระบบบริการจัดการคิวและตรวจสอบยานพาหนะ</p>
        </div>

        <div class="grid grid-cols-1 gap-4 my-8">
            <a href="user.html" class="flex items-center p-4 bg-emerald-50 border-2 border-emerald-500 rounded-2xl shadow-sm transition transform active:scale-95">
                <div class="bg-emerald-500 text-white p-4 rounded-xl text-xl">
                    <i class="fa-solid fa-user-plus w-6 text-center"></i>
                </div>
                <div class="ml-4">
                    <h2 class="text-xl font-semibold text-emerald-800">ลงทะเบียนเข้าบริการ</h2>
                    <p class="text-xs text-emerald-600">สำหรับลูกค้าผู้นำรถเข้าตรวจเช็ค</p>
                </div>
            </a>

            <a href="display.html" class="flex items-center p-4 bg-red-50 border-2 border-red-500 rounded-2xl shadow-sm transition transform active:scale-95">
                <div class="bg-red-600 text-white p-4 rounded-xl text-xl">
                    <i class="fa-solid fa-camera-web w-6 text-center"></i>
                </div>
                <div class="ml-4">
                    <h2 class="text-xl font-semibold text-red-800">หน้าจอตรวจจับ AI</h2>
                    <p class="text-xs text-red-600">เปิดกล้องสแกนป้ายทะเบียนหน้าร้าน</p>
                </div>
            </a>

            <a href="admin.html" class="flex items-center p-4 bg-gray-50 border-2 border-gray-400 rounded-2xl shadow-sm transition transform active:scale-95">
                <div class="bg-gray-700 text-white p-4 rounded-xl text-xl">
                    <i class="fa-solid fa-user-gear w-6 text-center"></i>
                </div>
                <div class="ml-4">
                    <h2 class="text-xl font-semibold text-gray-800">ระบบผู้ดูแล (Admin)</h2>
                    <p class="text-xs text-gray-500">ตรวจสอบคิว แก้ไขข้อมูล และออกรายงาน</p>
                </div>
            </a>
        </div>

        <div class="text-center text-xs text-gray-400 mb-4">
            &copy; 2026 Toyota Khon Kaen. All Rights Reserved.
        </div>
    </div>
</body>
</html>
