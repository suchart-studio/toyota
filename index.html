<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคิวอัจฉริยะ - Toyota Khon Kaen</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- เชื่อมต่อ PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ef4444">
    <style>body { font-family: 'Kanit', sans-serif; }</style>
</head>
<body class="bg-gray-50 flex flex-col justify-between min-h-screen">

    <div class="flex-1 flex flex-col items-center justify-center p-6">
        <div class="w-full max-w-sm bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100 p-8 text-center">
            
            <!-- Logo / Brand -->
            <div class="inline-flex items-center justify-center w-24 h-24 bg-red-50 text-red-600 rounded-full text-5xl mb-4 shadow-inner">
                <i class="fa-solid fa-car-side"></i>
            </div>
            <h1 class="text-3xl font-black text-gray-800 tracking-wide">โตโยต้าขอนแก่น</h1>
            <p class="text-gray-500 mt-2 text-base">ระบบลงทะเบียนและเช็คอินคิวอัจฉริยะ</p>

            <div class="mt-8 space-y-4">
                <!-- ปุ่มสําหรับลูกค้า -->
                <a href="user.html" class="flex items-center justify-between w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 px-6 rounded-2xl text-lg shadow-lg shadow-emerald-500/20 transition-all transform hover:-translate-y-0.5">
                    <span class="flex items-center gap-3"><i class="fa-solid fa-clipboard-list text-xl"></i> ลงทะเบียนเข้าบริการ</span>
                    <i class="fa-solid fa-chevron-right text-sm opacity-70"></i>
                </a>

                <!-- ปุ่มสําหรับหน้าจอทีวี -->
                <a href="display.html" class="flex items-center justify-between w-full bg-gray-900 hover:bg-black text-white font-bold py-4 px-6 rounded-2xl text-lg shadow-lg transition-all transform hover:-translate-y-0.5">
                    <span class="flex items-center gap-3"><i class="fa-solid fa-tv text-xl text-red-500"></i> เปิดหน้าจอ TV แนวนอน</span>
                    <i class="fa-solid fa-chevron-right text-sm opacity-70"></i>
                </a>

                <!-- ปุ่มสําหรับเจ้าหน้าที่ -->
                <a href="admin.html" class="flex items-center justify-between w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-3 px-6 rounded-xl text-sm transition-all">
                    <span class="flex items-center gap-2"><i class="fa-solid fa-user-gear"></i> ส่วนผู้ดูแลระบบ (Admin)</span>
                    <i class="fa-solid fa-arrow-right text-xs opacity-50"></i>
                </a>
            </div>
        </div>
    </div>

    <!-- แถบแจ้งเตือนให้ติดตั้ง PWA App -->
    <div id="pwaBanner" class="hidden bg-red-600 text-white p-4 fixed bottom-0 left-0 right-0 flex justify-between items-center z-50 shadow-2xl transition-all duration-300">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-download text-2xl animate-bounce"></i>
            <div class="text-left">
                <p class="font-bold text-sm sm:text-base">ติดตั้งแอปเพื่อความสะดวก</p>
                <p class="text-xs opacity-90">เข้าใช้งานได้รวดเร็วและล็อกหน้าจอ QR คิวอัตโนมัติ</p>
            </div>
        </div>
        <div class="flex gap-2">
            <button id="btnDismissPWA" class="text-white text-xs px-2 py-1 opacity-70 hover:opacity-100">ไว้ทีหลัง</button>
            <button id="btnInstallPWA" class="bg-white text-red-600 font-bold px-4 py-2 rounded-xl text-sm shadow hover:bg-gray-100 transition">ติดตั้ง</button>
        </div>
    </div>

    <div class="text-center text-xs text-gray-400 mb-6">&copy; 2026 Toyota Khon Kaen. All Rights Reserved.</div>

    <script>
        // 1. ตรวจสอบการล็อกหน้าจอคิวค้างไว้ (หากลงทะเบียนแล้วยังไม่ได้สแกน จะบังคับไปหน้าคิวทันที)
        if (localStorage.getItem('activeQueueId')) {
            window.location.href = 'user.html';
        }

        // 2. ลงทะเบียน Service Worker สำหรับ PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('Service Worker Registered Successfully'))
                .catch(err => console.error('Service Worker Register Failed', err));
        }

        // 3. จัดการระบบป๊อปอัพแจ้งเตือนการติดตั้ง PWA (ก่อนติดตั้ง)
        let deferredPrompt;
        const pwaBanner = document.getElementById('pwaBanner');
        const btnInstallPWA = document.getElementById('btnInstallPWA');
        const btnDismissPWA = document.getElementById('btnDismissPWA');

        window.addEventListener('beforeinstallprompt', (e) => {
            // ป้องกันเบราว์เซอร์เปิดหน้าต่างดีฟอลต์เอง
            e.preventDefault();
            deferredPrompt = e;
            // โชว์แบนเนอร์ติดตั้งแบบกำหนดเองของเรา
            pwaBanner.classList.remove('hidden');
        });

        btnInstallPWA.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`User response to the install prompt: ${outcome}`);
                deferredPrompt = null;
                pwaBanner.classList.add('hidden');
            }
        });

        btnDismissPWA.addEventListener('click', () => {
            pwaBanner.classList.add('hidden');
        });
    </script>
</body>
</html>
