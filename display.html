<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ยินดีต้อนรับ - โตโยต้าขอนแก่น</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        body { 
            font-family: 'Kanit', sans-serif; 
            background: radial-gradient(circle, #1a1a1a 0%, #000000 100%);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .neon-text-green { color: #10b981; text-shadow: 0 0 20px rgba(16, 185, 129, 0.5); }
        .neon-text-red { color: #ef4444; text-shadow: 0 0 20px rgba(239, 68, 68, 0.5); }
        
        /* Animation สำหรับรูปภาพและข้อความ */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
        .float-anim { animation: float 3s ease-in-out infinite; }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0px rgba(16, 185, 129, 0.7); }
            100% { box-shadow: 0 0 0 50px rgba(16, 185, 129, 0); }
        }
        .photo-pulse { animation: pulse-border 2s infinite; }

        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-between py-20 px-10 text-white select-none">

    <header class="text-center shrink-0">
        <img src="logo.png" alt="Toyota Logo" class="w-48 mx-auto mb-8 drop-shadow-2xl">
        <h1 class="text-7xl font-black tracking-tight text-white uppercase">
            โตโยต้าขอนแก่น <span class="text-red-600 italic">ยินดีต้อนรับ</span>
        </h1>
        <div class="h-2 w-64 bg-red-600 mx-auto mt-6 rounded-full shadow-[0_0_15px_rgba(239,68,68,0.8)]"></div>
    </header>

    <main class="flex-1 w-full flex flex-col items-center justify-center">
        
        <div id="idleState" class="text-center space-y-12">
            <div class="relative">
                <div class="absolute inset-0 bg-red-600 rounded-full blur-3xl opacity-20 animate-pulse"></div>
                <i class="fa-solid fa-qrcode text-[250px] text-gray-800 float-anim"></i>
            </div>
            <div class="space-y-4">
                <h2 class="text-5xl font-bold text-gray-500">กรุณาสแกน QR Code</h2>
                <p class="text-3xl text-gray-600">เพื่อเช็คอินเข้ารับบริการ</p>
            </div>
        </div>

        <div id="activeState" class="hidden w-full flex flex-col items-center space-y-12 fade-in">
            <div class="relative">
                <img id="custPhoto" src="" class="w-[500px] h-[500px] object-cover rounded-full border-[15px] border-emerald-500 shadow-2xl photo-pulse bg-white" alt="Customer">
                <div class="absolute -bottom-5 right-10 bg-emerald-500 text-white p-6 rounded-full text-5xl shadow-lg">
                    <i class="fa-solid fa-check-double"></i>
                </div>
            </div>

            <div class="text-center space-y-4">
                <p class="text-5xl text-emerald-400 font-semibold tracking-widest uppercase">WELCOME VIP CUSTOMER</p>
                <h2 id="custName" class="text-[120px] font-black leading-none text-white drop-shadow-2xl italic">-</h2>
            </div>

            <div class="w-full max-w-5xl grid grid-cols-2 gap-10">
                <div class="bg-white/5 border-2 border-white/10 p-10 rounded-[50px] backdrop-blur-md text-left">
                    <span class="text-3xl text-emerald-500 block mb-2 font-bold uppercase tracking-tighter">License Plate</span>
                    <span id="custPlate" class="text-7xl font-black text-white">-</span>
                </div>
                <div class="bg-white/5 border-2 border-white/10 p-10 rounded-[50px] backdrop-blur-md text-left">
                    <span class="text-3xl text-emerald-500 block mb-2 font-bold uppercase tracking-tighter">Car Model / Color</span>
                    <span id="custCar" class="text-6xl font-black text-white">-</span>
                </div>
            </div>
        </div>
    </main>

    <footer class="w-full flex justify-between items-end shrink-0">
        <div class="text-left">
            <p id="liveClock" class="text-7xl font-mono font-bold text-gray-400 italic">00:00:00</p>
            <p class="text-2xl text-gray-600 uppercase tracking-widest mt-2">Current Service Time</p>
        </div>
        <div class="text-right">
            <p class="text-3xl font-bold text-red-500 uppercase italic">Your satisfaction is our priority</p>
            <p class="text-xl text-gray-700">Powered by Toyota Khon Kaen IT System</p>
        </div>
    </footer>

    <input type="text" id="hiddenScanner" class="opacity-0 absolute top-0 pointer-events-none">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAbY0GCjqUEmQ85jayzOIdujgWQubXHjbc",
            authDomain: "toyota-c8d4c.firebaseapp.com",
            databaseURL: "https://toyota-c8d4c-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "toyota-c8d4c",
            storageBucket: "toyota-c8d4c.firebasestorage.app",
            messagingSenderId: "201981813251",
            appId: "1:201981813251:web:409045386613d5ad9e2436",
            measurementId: "G-W7FE21X5V2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let isProcessing = false;

        // ระบบนาฬิกา
        setInterval(() => {
            document.getElementById('liveClock').innerText = new Date().toLocaleTimeString('th-TH');
        }, 1000);

        // ฟังก์ชันยิงกระดาษ (Paper Shoot)
        function fireConfetti() {
            const duration = 5 * 1000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                const particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }

        // ฟังก์ชันประมวลผลการเช็คอิน
        function processCheckIn(queueId) {
            if (isProcessing) return;
            isProcessing = true;

            const idleState = document.getElementById('idleState');
            const activeState = document.getElementById('activeState');

            // อัปเดต Firebase เพื่อปลดล็อกมือถือลูกค้า
            update(ref(db, `registrations/${queueId}`), { status: 'checked-in' })
            .then(() => get(ref(db, `registrations/${queueId}`)))
            .then((snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    
                    // แสดงข้อมูล
                    document.getElementById('custName').innerText = `คุณ ${data.fullname}`;
                    document.getElementById('custPhoto').src = data.photoUrl;
                    document.getElementById('custPlate').innerText = data.licensePlate;
                    document.getElementById('custCar').innerText = `${data.carModel} / ${data.carColor}`;
                    
                    // สลับหน้าจอ
                    idleState.classList.add('hidden');
                    activeState.classList.remove('hidden');
                    
                    // ยิงกระดาษ!
                    fireConfetti();

                    // รีเซ็ตหน้าจอใน 10 วินาที
                    setTimeout(() => {
                        idleState.classList.remove('hidden');
                        activeState.classList.add('hidden');
                        isProcessing = false;
                    }, 10000);

                } else {
                    isProcessing = false;
                    console.error("Queue ID not found");
                }
            }).catch(err => {
                isProcessing = false;
                console.error(err);
            });
        }

        // ==========================================
        // 🛠️ ระบบดักฟังเครื่องสแกน (Keyboard Emulation)
        // ==========================================
        let scanBuffer = "";
        let scanTimeout;

        window.addEventListener('keydown', (e) => {
            clearTimeout(scanTimeout);
            if (e.key === 'Enter') {
                if (scanBuffer.trim().length > 5) {
                    processCheckIn(scanBuffer.trim());
                    scanBuffer = "";
                }
                return;
            }
            if (e.key.length === 1) {
                scanBuffer += e.key;
            }
            scanTimeout = setTimeout(() => { scanBuffer = ""; }, 200);
        });
    </script>
</body>
</html>
