<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Check-in Display - TV Landscape</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #0d1117; }
        .neon-border-green { box-shadow: 0 0 30px #10b981, inset 0 0 15px #10b981; }
        .neon-border-red { box-shadow: 0 0 30px #ef4444, inset 0 0 15px #ef4444; }
        /* สไตล์เคลียร์พื้นที่ให้กล้องสแกนเนอร์ทำงานได้เต็มประสิทธิภาพ ไม่บิดเบี้ยว */
        #reader { width: 100% !important; border: none !important; }
        #reader video { width: 100% !important; border-radius: 20px; object-fit: contain !important; }
    </style>
</head>
<body class="w-screen h-screen overflow-hidden flex flex-col p-8 text-white select-none">
    
    <div class="flex justify-between items-center border-b-4 border-red-600 pb-4 mb-6 shrink-0">
        <div class="flex items-center gap-6">
            <div class="bg-red-600 p-4 rounded-2xl text-4xl"><i class="fa-solid fa-car-side"></i></div>
            <h1 class="text-5xl font-black tracking-wider text-red-500">TOYOTA KHON KAEN AI</h1>
        </div>
        <div id="liveClock" class="text-4xl font-mono text-gray-400">00:00:00</div>
    </div>

    <div class="grid grid-cols-2 gap-8 flex-1 min-h-0">
        
        <div class="relative w-full h-full bg-gray-900 rounded-3xl border-4 border-gray-700 p-4 shadow-2xl flex flex-col justify-between overflow-hidden">
            <div class="absolute top-6 left-6 z-10 bg-emerald-600 text-white text-base px-4 py-1.5 rounded-full font-bold uppercase shadow-lg">
                <i class="fa-solid fa-qrcode mr-2 animate-pulse text-white"></i> QR Scanner Live
            </div>
            
            <div class="flex-1 flex items-center justify-center min-h-0">
                <div id="reader"></div>
            </div>

            <div class="mt-4 bg-black/50 p-3 rounded-2xl flex gap-3 items-center z-10 shrink-0">
                <input type="text" id="manualIdInput" placeholder="วางหรือพิมพ์คีย์คิวทดสอบที่นี่..." class="flex-1 bg-gray-800 text-white text-base px-4 py-2.5 rounded-xl focus:outline-none border border-gray-600 font-mono">
                <button id="btnManualCheck" class="bg-blue-500 hover:bg-blue-600 px-5 py-2.5 rounded-xl text-base font-bold transition shrink-0">เช็คอินคิว</button>
            </div>
        </div>

        <div id="welcomeBox" class="w-full h-full bg-gray-900/90 rounded-3xl border-4 border-emerald-500 neon-border-green flex flex-col items-center justify-center p-8 text-center transition-all duration-300 relative overflow-hidden">
            
            <div id="welcomeDefault" class="space-y-6">
                <i class="fa-solid fa-expand text-[120px] text-gray-600 animate-pulse"></i>
                <h2 class="text-4xl font-bold text-gray-400">กรุณาแสดง QR Code บัตรคิว</h2>
                <p class="text-xl text-gray-500">จ่อหน้าจอโทรศัพท์มือถือเข้าหาตัวกล้องรับรถด้านหน้า</p>
            </div>

            <div id="welcomeActive" class="hidden w-full space-y-6 flex flex-col items-center justify-center h-full">
                <h2 class="text-6xl font-black text-emerald-400 drop-shadow-lg tracking-wide uppercase">ยินดีต้อนรับ</h2>
                
                <img id="custPhoto" class="w-64 h-64 object-cover rounded-full border-8 border-emerald-400 shadow-2xl bg-white my-4" src="" alt="Customer Photo">

                <div class="space-y-2">
                    <p class="text-2xl text-gray-300 font-medium">คุณลูกค้าผู้ทรงเกียรติ</p>
                    <h3 id="custName" class="text-5xl font-bold text-white bg-gradient-to-r from-white to-gray-300 inline-block px-8 py-2 rounded-2xl">-</h3>
                </div>

                <div class="w-full grid grid-cols-2 gap-4 mt-6 bg-gray-800/80 p-6 rounded-3xl border-2 border-emerald-500/30">
                    <div class="text-left bg-black/40 p-4 rounded-xl">
                        <span class="text-lg text-emerald-400 block"><i class="fa-solid fa-car"></i> ทะเบียน</span>
                        <span id="custPlate" class="text-3xl font-bold tracking-wider text-white">-</span>
                    </div>
                    <div class="text-left bg-black/40 p-4 rounded-xl">
                        <span class="text-lg text-emerald-400 block"><i class="fa-solid fa-palette"></i> รุ่นรถ / สี</span>
                        <span id="custCar" class="text-3xl font-bold text-white">-</span>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <div class="text-center text-xl text-gray-500 font-light border-t border-gray-800 pt-3 mt-6 shrink-0">
         ศูนย์บริการ โตโยต้าขอนแก่น ยินดีให้บริการด้วยใจจริง
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAbY0GCjqUEmQ85jayzOIdujgWQubXHjbc",
            authDomain: "toyota-c8d4c.firebaseapp.com",
            databaseURL: "https://toyota-c8d4c-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "toyota-c8d4c",
            storageBucket: "toyota-c8d4c.firebasestorage.app",
            messagingSenderId: "201981813251",
            appId: "1:201981813251:web:409045386613d5ad9e2436",
            measurementId: "G-W7FE21X5V2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let isProcessing = false; 

        // นาฬิกาบอกเวลา
        setInterval(() => {
            document.getElementById('liveClock').innerText = new Date().toLocaleTimeString('th-TH');
        }, 1000);

        // ฟังก์ชันหัวใจหลัก: ประมวลผลเช็คอินจากรหัส ID
        function processCheckIn(queueId) {
            if (isProcessing) return; 
            isProcessing = true;

            const welcomeDefault = document.getElementById('welcomeDefault');
            const welcomeActive = document.getElementById('welcomeActive');
            const welcomeBox = document.getElementById('welcomeBox');

            console.log("กำลังตรวจสอบข้อมูลรหัสคิว:", queueId);

            get(ref(db, `registrations/${queueId}`)).then((snapshot) => {
                if (snapshot.exists()) {
                    const match = snapshot.val();
                    
                    document.getElementById('custName').innerText = match.fullname;
                    document.getElementById('custPhoto').src = match.photoUrl;
                    document.getElementById('custPlate').innerText = match.licensePlate;
                    document.getElementById('custCar').innerText = `${match.carModel} (${match.carColor})`;
                    
                    welcomeDefault.classList.add('hidden');
                    welcomeActive.classList.remove('hidden');
                    welcomeBox.className = "w-full h-full bg-emerald-950/90 rounded-3xl border-4 border-emerald-400 neon-border-green flex flex-col items-center justify-center p-8 text-center transition-all duration-300";

                    // แสดงผลค้างไว้ 7 วินาที แล้วรีเซ็ตหน้าจอเพื่อรองรับคิวถัดไป
                    setTimeout(() => {
                        welcomeDefault.classList.remove('hidden');
                        welcomeActive.classList.add('hidden');
                        welcomeBox.className = "w-full h-full bg-gray-900/90 rounded-3xl border-4 border-emerald-500 neon-border-green flex flex-col items-center justify-center p-8 text-center transition-all duration-300";
                        isProcessing = false;
                    }, 7000);

                } else {
                    showErrorState("ไม่พบข้อมูลคิวนี้ในระบบ");
                }
            }).catch((err) => {
                showErrorState("เกิดข้อผิดพลาดในการเชื่อมต่อฐานข้อมูล");
                console.error(err);
            });
        }

        function showErrorState(msg) {
            const welcomeBox = document.getElementById('welcomeBox');
            const originalHTML = welcomeBox.innerHTML;
            
            welcomeBox.className = "w-full h-full bg-red-950/90 rounded-3xl border-4 border-red-500 neon-border-red flex flex-col items-center justify-center p-8 text-center transition-all duration-300";
            welcomeBox.innerHTML = `
                <div class="space-y-4 flex flex-col items-center justify-center h-full">
                    <i class="fa-solid fa-triangle-exclamation text-[100px] text-red-500 animate-bounce"></i>
                    <h2 class="text-5xl font-black text-white">ตรวจไม่พบข้อมูลคิว</h2>
                    <p class="text-2xl text-red-300 mt-4">${msg}</p>
                </div>
            `;
            setTimeout(() => {
                welcomeBox.innerHTML = originalHTML;
                welcomeBox.className = "w-full h-full bg-gray-900/90 rounded-3xl border-4 border-emerald-500 neon-border-green flex flex-col items-center justify-center p-8 text-center transition-all duration-300";
                isProcessing = false;
            }, 4000);
        }

        // 1. เปิดกล้องสแกนเนอร์สแกนแบบ Full-Frame (เพิกเฉย qrbox)
        const html5QrCode = new Html5QrCode("reader");
        html5QrCode.start(
            { facingMode: "user" }, 
            { fps: 15 }, // เช็ค 15 เฟรมต่อวินาทีเพื่อความลื่นไหล
            (decodedText) => { processCheckIn(decodedText); },
            () => { /* ทำงานเงียบๆ เมื่อไม่เจอคิวอาร์โค้ดในเฟรม */ }
        ).catch(err => console.error("สตาร์ทระบบกล้องล้มเหลว:", err));

        // 2. ดักฟังปุ่มกดกรณีพิมพ์ตรวจสอบแบบ Manual
        document.getElementById('btnManualCheck').addEventListener('click', () => {
            const inputVal = document.getElementById('manualIdInput').value.trim();
            if(inputVal) {
                processCheckIn(inputVal);
                document.getElementById('manualIdInput').value = ""; // เคลียร์ช่องพิมพ์
            }
        });
    </script>
</body>
</html>
