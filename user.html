<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนเข้าตรวจเช็ค - Toyota Khon Kaen</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ef4444">
    <style>body { font-family: 'Kanit', sans-serif; }</style>
    <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="โตโยต้าขอนแก่น">

<link rel="apple-touch-icon" href="logo.png">
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen">
    <div class="w-full max-w-md min-h-screen bg-white shadow-xl flex flex-col p-6 border-t-8 border-emerald-500">
        
        <!-- ส่วนหัว (จะซ่อนเมื่อถูกล็อกหน้าจอแสดง QR คิว) -->
        <div id="headerNav" class="flex items-center justify-between mb-6">
            <a href="index.html" class="text-gray-600 text-xl"><i class="fa-solid fa-arrow-left"></i></a>
            <h1 class="text-2xl font-bold text-emerald-700">ลงทะเบียนตรวจเช็ครถ</h1>
            <div></div>
        </div>

        <!-- ฟอร์มกรอกข้อมูลหลัก -->
        <div id="formContainer">
            <form id="regForm" class="space-y-4 flex-1 pb-8">
                <div>
                    <label class="block text-gray-700 font-medium mb-1 text-lg">ภาพถ่ายหน้าตรงลูกค้า</label>
                    <div class="flex flex-col items-center bg-gray-50 p-3 rounded-xl border-2 border-dashed border-gray-300">
                        <video id="video" class="w-full max-h-48 rounded-lg bg-black hidden" autoplay playsinline></video>
                        <canvas id="canvas" class="w-full max-h-48 rounded-lg bg-black hidden"></canvas>
                        <img id="photoPreview" class="w-32 h-32 object-cover rounded-full border-4 border-emerald-500 hidden" src="" alt="Preview">
                        
                        <div class="mt-3 flex gap-2">
                            <button type="button" id="startCam" class="bg-blue-500 text-white px-4 py-2 rounded-xl text-sm font-semibold"><i class="fa-solid fa-camera mr-1"></i> เปิดกล้อง</button>
                            <button type="button" id="captureCam" class="bg-red-500 text-white px-4 py-2 rounded-xl text-sm font-semibold hidden"><i class="fa-solid fa-circle-dot mr-1"></i> ถ่ายรูป</button>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-gray-700 font-medium text-lg">ชื่อ - นามสกุล</label>
                    <input type="text" id="fullname" required class="w-full px-4 py-3 bg-gray-50 border-2 border-gray-200 rounded-xl text-lg focus:outline-none focus:border-emerald-500">
                </div>

                <div>
                    <label class="block text-gray-700 font-medium text-lg">เบอร์โทรศัพท์</label>
                    <input type="tel" id="phone" required class="w-full px-4 py-3 bg-gray-50 border-2 border-gray-200 rounded-xl text-lg focus:outline-none focus:border-emerald-500">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-gray-700 font-medium text-lg">รุ่นรถยนต์</label>
                        <input type="text" id="carModel" placeholder="Yaris, Revo" required class="w-full px-4 py-3 bg-gray-50 border-2 border-gray-200 rounded-xl text-lg focus:outline-none focus:border-emerald-500">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-medium text-lg">สีรถ</label>
                        <input type="text" id="carColor" placeholder="ขาว, ดำ" required class="w-full px-4 py-3 bg-gray-50 border-2 border-gray-200 rounded-xl text-lg focus:outline-none focus:border-emerald-500">
                    </div>
                </div>

                <div>
                    <label class="block text-gray-700 font-medium text-lg">หมายเลขทะเบียนรถ</label>
                    <input type="text" id="licensePlate" placeholder="กข1234ขอนแก่น" required class="w-full px-4 py-3 bg-gray-50 border-2 border-gray-200 rounded-xl text-lg font-bold text-gray-800 uppercase focus:outline-none focus:border-emerald-500">
                </div>

                <div>
                    <label class="block text-gray-700 font-medium text-lg">วันที่เข้ารับบริการ</label>
                    <input type="date" id="serviceDate" required class="w-full px-4 py-3 bg-gray-50 border-2 border-gray-200 rounded-xl text-lg focus:outline-none focus:border-emerald-500">
                </div>

                <button type="submit" id="btnSubmit" class="w-full bg-emerald-500 text-white font-bold py-4 rounded-xl text-xl shadow-lg hover:bg-emerald-600 transition">
                    <i class="fa-solid fa-cloud-arrow-up mr-2"></i> ลงทะเบียนและรับ QR บัตรคิว
                </button>
            </form>
        </div>

        <!-- หน้าจอแสดงผล QR Code สำเร็จ (ล็อกถาวรจนกว่าจะสแกนสำเร็จ) -->
        <div id="qrContainer" class="hidden flex-1 flex flex-col items-center justify-center text-center my-auto space-y-6 pb-12">
            <div class="text-emerald-500 text-6xl animate-bounce"><i class="fa-solid fa-lock text-red-500"></i></div>
            <h2 class="text-3xl font-bold text-gray-800">บัตรคิวเข้าศูนย์บริการ</h2>
            <p class="text-gray-500 max-w-xs text-sm">หน้าจอนี้จะถูกล็อกไว้เพื่อความสะดวก ท่านไม่ต้องค้นหาไฟล์ภาพเมื่อเดินทางมาถึงศูนย์โตโยต้าขอนแก่น</p>
            
            <!-- ตั๋วคิวจำลอง -->
            <div class="bg-gray-50 border-2 border-gray-200 p-6 rounded-3xl shadow-inner flex flex-col items-center w-full max-w-xs">
                <span class="text-xs bg-red-100 text-red-600 px-3 py-1 rounded-full font-bold uppercase tracking-wider mb-4">Toyota Khon Kaen Queue</span>
                <img id="qrImage" class="w-48 h-48 border-4 border-white shadow-md bg-white" src="" alt="QR Code Ticket">
                <p id="ticketName" class="font-bold text-gray-700 text-xl mt-4">-</p>
                <p id="ticketPlate" class="text-gray-400 font-medium text-sm">-</p>
            </div>
            
            <div class="text-xs text-red-500 animate-pulse font-medium bg-red-50 px-4 py-2 rounded-xl">
                <i class="fa-solid fa-circle-info"></i> ระบบปลดล็อกหน้าจออัตโนมัติเมื่อกล้องที่ศูนย์สแกนสำเร็จ
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, off, get } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
        import { getStorage, ref as sRef, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAbY0GCjqUEmQ85jayzOIdujgWQubXHjbc",
            authDomain: "toyota-c8d4c.firebaseapp.com",
            databaseURL: "https://toyota-c8d4c-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "toyota-c8d4c",
            storageBucket: "toyota-c8d4c.firebasestorage.app",
            messagingSenderId: "201981813251",
            appId: "1:201981813251:web:409045386613d5ad9e2436",
            measurementId: "G-W7FE21X5V2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const storage = getStorage(app);

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const photoPreview = document.getElementById('photoPreview');
        const startCamBtn = document.getElementById('startCam');
        const captureCamBtn = document.getElementById('captureCam');
        let imgDataUrl = "";

        // ตรวจสอบสถานะการล็อกหน้าจอบน LocalStorage ตอนโหลดหน้าเว็บบราวเซอร์
        window.addEventListener('DOMContentLoaded', () => {
            const activeQueueId = localStorage.getItem('activeQueueId');
            if (activeQueueId) {
                lockScreenToQR(activeQueueId);
            }
        });

        // ฟังก์ชันดึงฐานข้อมูลมาโชว์หน้าคิวที่ล็อกไว้ และคอยฟังเสียงสัญญาณตรวจสอบสำเร็จ
        function lockScreenToQR(queueId) {
            document.getElementById('headerNav').classList.add('hidden');
            document.getElementById('formContainer').classList.add('hidden');
            document.getElementById('qrContainer').classList.remove('hidden');

            // เจาะจงดึงข้อมูลมาแสดงผลบนตั๋วคิว
            get(ref(db, `registrations/${queueId}`)).then((snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    document.getElementById('qrImage').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${queueId}`;
                    document.getElementById('ticketName').innerText = data.fullname;
                    document.getElementById('ticketPlate').innerText = "ทะเบียน: " + data.licensePlate;

                    // เปิดฟังก์ชัน Realtime Listener ดักฟังว่าศูนย์บริการสแกนเช็คอินหรือยัง
                    const queueStatusRef = ref(db, `registrations/${queueId}`);
                    onValue(queueStatusRef, (statusSnap) => {
                        const currentData = statusSnap.val();
                        if (currentData && currentData.status === 'checked-in') {
                            // ปลดล็อกระบบล็อกหน้าจอทันที!
                            localStorage.removeItem('activeQueueId');
                            off(queueStatusRef); // ยกเลิกการดักฟังฐานข้อมูล

                            // แสดงหน้าต่างปลดล็อกขอบคุณสำเร็จ
                            document.getElementById('qrContainer').innerHTML = `
                                <div class="flex-1 flex flex-col items-center justify-center text-center space-y-6 py-12">
                                    <div class="text-emerald-500 text-7xl animate-bounce"><i class="fa-solid fa-circle-check"></i></div>
                                    <h2 class="text-3xl font-bold text-gray-800">เช็คอินสำเร็จแล้ว!</h2>
                                    <p class="text-lg text-gray-600 px-4 font-medium">ศูนย์บริการโตโยต้าขอนแก่น ยินดีต้อนรับค่ะ เจ้าหน้าที่กำลังดูแลรถของท่าน</p>
                                    <p class="text-xs text-gray-400 animate-pulse pt-4">ระบบกำลังกลับหน้าเมนูหลักอัตโนมัติ...</p>
                                </div>
                            `;
                            setTimeout(() => {
                                window.location.href = 'index.html';
                            }, 5000);
                        }
                    });
                } else {
                    // ป้องกัน Error หากคิวนี้ถูกแอดมินลบออกไปดื้อๆ ให้ปล่อยหลุดล็อกไปหน้าแรก
                    localStorage.removeItem('activeQueueId');
                    location.reload();
                }
            });
        }

        startCamBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                video.classList.remove('hidden');
                captureCamBtn.classList.remove('hidden');
                startCamBtn.classList.add('hidden');
                photoPreview.classList.add('hidden');
            } catch (err) {
                alert("เข้าถึงกล้องไม่ได้: " + err);
            }
        });

        captureCamBtn.addEventListener('click', () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            imgDataUrl = canvas.toDataURL('image/jpeg');
            photoPreview.src = imgDataUrl;
            photoPreview.classList.remove('hidden');
            video.classList.add('hidden');
            captureCamBtn.classList.add('hidden');
            startCamBtn.classList.remove('hidden');
            const stream = video.srcObject;
            if (stream) stream.getTracks().forEach(track => track.stop());
        });

        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btnSubmit = document.getElementById('btnSubmit');
            btnSubmit.disabled = true;
            btnSubmit.innerText = "กำลังประมวลผลระบบคิว...";

            try {
                let photoUrl = "https://placehold.co/150x150/emerald/ffffff?text=No+Photo";
                if (imgDataUrl) {
                    const storageRef = sRef(storage, 'customer_photos/' + Date.now() + '.jpg');
                    await uploadString(storageRef, imgDataUrl, 'data_url');
                    photoUrl = await getDownloadURL(storageRef);
                }

                const newRef = push(ref(db, 'registrations'));
                const fullname = document.getElementById('fullname').value;
                const licensePlate = document.getElementById('licensePlate').value;

                await set(newRef, {
                    fullname: fullname,
                    phone: document.getElementById('phone').value,
                    carModel: document.getElementById('carModel').value,
                    carColor: document.getElementById('carColor').value,
                    licensePlate: licensePlate,
                    serviceDate: document.getElementById('serviceDate').value,
                    photoUrl: photoUrl,
                    status: "pending", // ระบุสถานะเริ่มต้นเป็นรอดำเนินการสแกน
                    timestamp: Date.now()
                });

                const qrId = newRef.key; 
                // ฝังข้อมูลล็อกลงเครื่องทันทีเพื่อล็อกหน้าจอ
                localStorage.setItem('activeQueueId', qrId);
                
                // สลับระบบไปทำงานที่ฟังก์ชันล็อกหน้าจอคิวโชว์ทันที
                lockScreenToQR(qrId);

            } catch (error) {
                alert("เกิดข้อผิดพลาด: " + error.message);
                btnSubmit.disabled = false;
                btnSubmit.innerText = "ลงทะเบียนและรับ QR บัตรคิว";
            }
        });
    </script>
</body>
</html>
